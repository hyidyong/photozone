<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>포토존</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;background:#000;overflow:hidden;
    font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif}
  #canvas{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;display:block}
  video{display:none}
  #ui{position:fixed;inset:0;pointer-events:none}
  #topbar{
    position:absolute;top:0;left:0;right:0;
    padding:env(safe-area-inset-top,16px) 20px 12px;
    background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent);
    display:flex;align-items:center;justify-content:space-between;
    pointer-events:auto
  }
  .top-title{font-size:12px;letter-spacing:.18em;color:rgba(255,255,255,.65);text-transform:uppercase}
  .side-btn{
    width:44px;height:44px;border-radius:50%;
    background:rgba(255,255,255,.13);border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    color:#fff;backdrop-filter:blur(8px);transition:background .15s;pointer-events:auto
  }
  .side-btn:active{background:rgba(255,255,255,.28)}
  #bottombar{
    position:absolute;bottom:0;left:0;right:0;
    padding-bottom:calc(env(safe-area-inset-bottom,0px) + 36px);
    background:linear-gradient(to top,rgba(0,0,0,.55),transparent);
    display:flex;align-items:center;justify-content:center;gap:44px;
    pointer-events:auto
  }
  #capture-btn{
    width:76px;height:76px;border-radius:50%;
    border:3px solid rgba(255,255,255,.88);background:transparent;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:transform .1s
  }
  #capture-btn:active{transform:scale(.88)}
  #capture-btn::after{
    content:'';width:60px;height:60px;border-radius:50%;
    background:rgba(255,255,255,.88);display:block
  }
  #result-screen{
    position:fixed;inset:0;background:#0a0a0a;
    display:none;flex-direction:column;align-items:center;
    justify-content:center;gap:20px;padding:24px;
    padding-top:max(24px,env(safe-area-inset-top,0px))
  }
  #result-screen.show{display:flex}
  #result-img{max-height:65vh;max-width:100%;border-radius:12px;object-fit:contain}
  .result-row{display:flex;gap:12px;width:100%;max-width:360px}
  .btn-ghost{
    flex:1;padding:15px 0;border:1px solid rgba(255,255,255,.15);
    background:transparent;color:#f0ede8;border-radius:10px;
    font-size:14px;cursor:pointer
  }
  .btn-ghost:active{background:rgba(255,255,255,.08)}
  .btn-accent{
    flex:1;padding:15px 0;border:none;background:#e8d5b0;
    color:#1a1206;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer
  }
  .btn-accent:active{opacity:.8}
  #save-guide{
    width:100%;max-width:360px;border-radius:12px;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
    padding:16px 18px;display:none;flex-direction:column;gap:10px
  }
  #save-guide.show{display:flex}
  .guide-title{font-size:11px;letter-spacing:.12em;color:rgba(255,255,255,.4);text-transform:uppercase}
  .guide-step{display:flex;align-items:flex-start;gap:10px}
  .guide-num{
    width:22px;height:22px;border-radius:50%;
    background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);
    font-size:11px;font-weight:600;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;margin-top:1px
  }
  .guide-text{font-size:13px;color:rgba(255,255,255,.75);line-height:1.6}
  #flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .08s}
</style>
</head>
<body>
<video id="video" playsinline autoplay muted></video>
<canvas id="canvas"></canvas>
<div id="ui">
  <div id="topbar">
    <span class="top-title">Photo Zone</span>
    <button class="side-btn" onclick="flipCamera()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
      </svg>
    </button>
  </div>
  <div id="bottombar">
    <button class="side-btn" id="mirror-btn" onclick="toggleMirror()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="3" x2="12" y2="21"/>
        <polyline points="5 8 2 12 5 16"/><polyline points="19 8 22 12 19 16"/>
      </svg>
    </button>
    <button id="capture-btn" onclick="capture()"></button>
    <div style="width:44px"></div>
  </div>
</div>
<div id="result-screen">
  <img id="result-img" src="" alt="결과"/>
  <div class="result-row">
    <button class="btn-ghost" onclick="retake()">↩ 다시 찍기</button>
    <button class="btn-accent" onclick="savePhoto()" id="dl-btn">⬇ 저장하기</button>
  </div>

  <!-- 저장 안내 카드 -->
  <div id="save-guide">
    <p class="guide-title" id="guide-title"></p>
    <div class="guide-step">
      <div class="guide-num">1</div>
      <p class="guide-text" id="guide-step1"></p>
    </div>
    <div class="guide-step">
      <div class="guide-num">2</div>
      <p class="guide-text" id="guide-step2"></p>
    </div>
  </div>
</div>
<div id="flash"></div>

const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const flash  = document.getElementById('flash');
let stream=null, facingMode='environment', mirror=false, raf=null;

const imgs = CHARS.map(c => {
  const i = new Image();
  i.src = c.src;
  return i;
});

async function init() {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width:{ideal:1280}, height:{ideal:720} },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    fitCanvas();
    loop();
  } catch(e) {
    alert('카메라 권한을 허용해주세요.\n' + e.message);
  }
}

function fitCanvas() {
  canvas.width  = video.videoWidth  || window.innerWidth;
  canvas.height = video.videoHeight || window.innerHeight;
}

function loop() {
  if (raf) cancelAnimationFrame(raf);
  function draw() {
    if (!video.videoWidth) { raf = requestAnimationFrame(draw); return; }
    if (canvas.width !== video.videoWidth) fitCanvas();

    // 카메라 프레임
    ctx.save();
    if (mirror) { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    ctx.restore();

    // 캐릭터 렌더
    CHARS.forEach((c, i) => {
      const img = imgs[i];
      if (!img.complete || !img.naturalWidth) return;
      const cw = canvas.width, ch = canvas.height;
      const w  = c.w * cw;
      const h  = w * (img.naturalHeight / img.naturalWidth);

      // 좌우 위치
      const px = c.side === 'left'
        ? c.offsetX * cw
        : cw - w - c.offsetX * cw;

      // 바닥 기준 배치
      const py = c.bottom ? ch - h : 0;

      ctx.drawImage(img, px, py, w, h);
    });

    raf = requestAnimationFrame(draw);
  }
  draw();
}

function capture() {
  flash.style.opacity = '.75';
  setTimeout(() => flash.style.opacity = '0', 160);
  setTimeout(() => {
    const url = canvas.toDataURL('image/jpeg', .93);
    document.getElementById('result-img').src = url;
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const guide = document.getElementById('save-guide');
    guide.classList.add('show');
    if (isIOS) {{
      document.getElementById('dl-btn').style.display = 'none';
      document.getElementById('guide-title').textContent = '📱 아이폰 저장 방법';
      document.getElementById('guide-step1').textContent = '위 사진을 손가락으로 꾹 길게 누르세요';
      document.getElementById('guide-step2').textContent = '\'사진에 추가\' 또는 \'이미지 저장\' 을 탭하면 카메라 롤에 저장돼요';
    }} else {{
      document.getElementById('dl-btn').style.display = 'flex';
      document.getElementById('guide-title').textContent = '💾 저장 방법';
      document.getElementById('guide-step1').textContent = '\'저장하기\' 버튼을 누르면 자동으로 다운로드 폴더에 저장돼요';
      document.getElementById('guide-step2').textContent = '갤러리 앱 → 다운로드 폴더에서 확인할 수 있어요';
    }}
    document.getElementById('result-screen').classList.add('show');
    if (raf) cancelAnimationFrame(raf);
  }, 80);
}

function retake() {
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('save-guide').classList.remove('show');
  document.getElementById('dl-btn').style.display = 'flex';
  loop();
}
function savePhoto() {
  const a = document.createElement('a');
  a.href = document.getElementById('result-img').src;
  a.download = 'photozone_' + Date.now() + '.jpg';
  a.click();
}
async function flipCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  await init();
}
function toggleMirror() {
  mirror = !mirror;
  document.getElementById('mirror-btn').style.background =
    mirror ? 'rgba(232,213,176,.3)' : 'rgba(255,255,255,.13)';
}
window.addEventListener('resize', () => { if (stream) fitCanvas(); });
init();
</script>
